<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>everycalc | 퍼센트 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #121212; color: #eee; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; }
        input { padding: 10px; width: 80px; border-radius: 5px; border: none; margin: 5px; }
        button { padding: 10px 20px; background-color: #FFCC00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>퍼센트 계산기</h1>
        <input type="number" id="val" placeholder="숫자">의 
        <input type="number" id="perc" placeholder="%">는?<br><br>
        <button onclick="document.getElementById('res').innerText = (document.getElementById('val').value * document.getElementById('perc').value / 100)">계산하기</button>
        <h2>결과: <span id="res">0</span></h2>
    </div>
</body>
</html>
