<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>everycalc | 금융, 일상, 건강 계산기 모음집</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        header { text-align: center; padding: 50px 0; }
        h1 { color: #FFCC00; font-size: 3rem; }
        
        .category-section { max-width: 1000px; margin: 40px auto; }
        .category-title { border-left: 5px solid #FFCC00; padding-left: 15px; margin-bottom: 20px; font-size: 1.5rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>
    <header>
        <h1>everycalc</h1>
        <p>가장 많이 찾는 계산기들을 한곳에</p>
    </header>

    <section class="category-section">
        <h2 class="category-title">금융/재테크</h2>
        <div class="grid">
            <a href="salary.html" class="card" style="text-decoration: none; color: white;">
                <h3>연봉 실수령액</h3>
                <p>세금과 보험료를 반영한 실제 월급 계산</p>
            </a>
            <div class="card"><h3>적금/예금 이자</h3><p>복리와 이자율을 반영한 수익 확인</p></div>
        </div>
    </section>

    <section class="category-section">
        <h2 class="category-title">일상/수학</h2>
        <div class="grid">
            <div class="card"><h3>퍼센트(%) 계산기</h3><p>할인율, 비율, 증감률 계산 도구</p></div>
            <div class="card"><h3>단위 변환기</h3><p>길이, 무게, 넓이 등 단위 변환</p></div>
        </div>
    </section>
</body>
</html>
