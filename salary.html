<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연봉 실수령액 계산기</title>
    <style>
        body { 
            background: #121212; 
            color: #fff; 
            padding: 20px; 
            text-align: center; 
            font-family: 'Pretendard', sans-serif; 
        }
        .box { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 400px; 
            margin: auto; 
            border: 1px solid #333;
        }
        input { 
            padding: 10px; 
            width: 150px; 
            border-radius: 5px; 
            border: none; 
            margin-bottom: 10px;
        }
        button { 
            padding: 10px 20px; 
            background: #FFCC00; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>연봉 실수령액</h1>
        <input type="number" id="salary" placeholder="연봉 입력 (만원)">
        <br>
        <button onclick="calculate()">계산하기</button>
        <h2 id="result">월 예상 수령액: 0원</h2>
        <br>
        <a href="index.html" style="color: #FFCC00;">메인으로 돌아가기</a>
    </div>

    <script>
        function calculate() {
            let salary = document.getElementById('salary').value;
            let monthly = Math.floor((salary * 10000 / 12) * 0.9);
            document.getElementById('result').innerText = "월 예상 수령액: " + monthly.toLocaleString() + "원";
        }
    </script>
</body>
</html>
