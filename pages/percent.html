<body>


<header class="header">

<div class="container">


<div class="logo">

<a href="../index.html">

<span class="logo-main">

</span>

<div class="header-buttons">

<button id="darkModeToggle"
aria-label="다크모드">

🌙

</button>

</div>


</div>

</header>




<main>


<section class="calculator-page">


<div class="container">


<div class="calculator-header">


<h1>
퍼센트 계산기
</h1>


<p>
숫자의 퍼센트, 증가율, 감소율을 계산합니다.
</p>


</div>




<div class="calculator-container">


<div class="calculator-box">


<div class="calculator-form">


<label>
기준 숫자
</label>


<input
id="number"
type="number"
placeholder="예: 100">



<label>
퍼센트(%)
</label>


<input
id="percent"
type="number"
placeholder="예: 20">



<button
id="calculate"
class="calculate-button">

계산하기

</button>


</div>




<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>



</div>




<div class="calculator-info">


<h2>
퍼센트 계산기 사용 방법
</h2>


<p>

기준 숫자와 퍼센트를 입력하면 해당 값과 증가, 감소 결과를 계산합니다.

</p>


</div>



</div>


</div>
