<main>


<section class="calculator-page">


<div class="container">


<div class="calculator-header">


<h1>
평균 계산기
</h1>


<p>
여러 숫자의 평균값을 계산합니다.
</p>


</div>



<div class="calculator-container">


<div class="calculator-box">


<div class="calculator-form">


<label>
계산할 숫자를 입력하세요
</label>


<p class="input-help">

숫자는 쉼표(,) 또는 띄어쓰기(스페이스)로 구분해서 입력하세요.<br>

예: 10, 20, 30, 40 또는 10 20 30 40

</p>



<input
id="numbers"
type="text"
placeholder="예: 10, 20, 30, 40">



<button
id="calculate"
class="calculate-button">

계산하기

</button>


</div>



<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>



</div>



<div class="calculator-info">


<h2>
평균 계산기 사용 방법
</h2>


<p>

계산할 숫자를 입력하면 입력 개수, 합계, 평균값을 계산합니다.

</p>
