<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>평균 계산기 | EveryCalc</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/calculator.css">

</head>


<body>


<header class="header">

<div class="container">

<div class="logo">

<a href="../index.html">

<span class="logo-main">
EveryCalc
</span>

</a>

</div>

</div>

</header>



<main class="calculator-page">


<div class="calculator-box">


<h1>
평균 계산기
</h1>


<p>
여러 숫자의 평균값을 계산합니다.
</p>



<label>
숫자를 입력하세요
</label>


<input
id="numbers"
type="text"
placeholder="예: 10, 20, 30, 40">


<button id="calculate">

계산하기

</button>



<div class="result-box">


<h2>
결과
</h2>


<p id="result">

숫자를 입력해주세요.

</p>


</div>



</div>


</main>



<script src="../js/average.js"></script>


</body>

</html>
