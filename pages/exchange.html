<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EveryCalc 환율 계산기</title>

<meta name="description"
content="세계 주요 통화를 실시간 환율 기준으로 계산하는 EveryCalc 환율 계산기">

<link rel="stylesheet" href="exchange.css">

</head>


<body>


<header>

    <h1>💱 EveryCalc 환율 계산기</h1>

    <p>
        세계 주요 통화 환율을 쉽고 빠르게 계산하세요.
    </p>

</header>



<main>


<!-- =========================
     계산 결과
========================== -->


<section class="result-box">


    <h2>계산 결과</h2>


    <div id="result">

        0 KRW = 0 USD

    </div>


    <div id="rate-info">

        현재 환율 정보를 불러오는 중...

    </div>


</section>





<!-- =========================
     입력 영역
========================== -->


<section class="calculator">


    <label>

        금액

        <input
        type="number"
        id="amount"
        value="1"
        min="0">

    </label>



    <label>

        변환 전 통화

        <select id="fromCurrency"></select>

    </label>



    <button id="swapBtn">

        ⇄

    </button>



    <label>

        변환 후 통화

        <select id="toCurrency"></select>

    </label>



    <button id="calculateBtn">

        계산하기

    </button>


</section>





<!-- =========================
     추가 정보
========================== -->


<section class="info-box">


<h3>환율 정보</h3>


<p id="updateTime">

업데이트 시간 확인 중...

</p>


<p>

환율 데이터 제공:
Frankfurter API

</p>


</section>



</main>





<footer>


<p>

© EveryCalc

</p>


</footer>





<script src="currencies.js"></script>

<script src="exchange.js"></script>


</body>

</html>
