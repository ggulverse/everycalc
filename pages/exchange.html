<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EveryCalc | 환율 계산기</title>

<meta name="description"
content="EveryCalc 실시간 환율 계산기">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/calculator.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/darkmode.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<header class="header">

<div class="container">


<div class="logo">

<a href="../index.html">

<span class="logo-main">
EveryCalc
</span>

<span class="logo-sub">
Every Calculation in One Place
</span>

</a>

</div>



<nav class="navigation">

<ul>

<li>
<a href="../index.html">
홈
</a>
</li>

<li>
<a href="../index.html#popular">
인기 계산기
</a>
</li>

<li>
<a href="../index.html#categories">
카테고리
</a>
</li>

</ul>

</nav>



<div class="header-buttons">

<button id="darkModeToggle">

🌙

</button>

</div>


</div>

</header>





<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">


<h1>
💱 환율 계산기
</h1>


<p>
실시간 환율 기준으로 원하는 통화를 변환합니다.
</p>


</div>







<section class="calculator-box">



<div class="calculator-form">



<label>
금액
</label>


<input
id="amount"
type="number"
value="1"
min="0">







<label>
변환 전 통화
</label>


<div class="currency-selector">


<div
id="fromSelected"
class="selected-currency">


<span id="fromFlag">
🇺🇸
</span>


<span id="fromText">
USD - 미국 달러
</span>


</div>



<input
id="fromSearch"
type="text"
placeholder="통화 검색">



<div
id="fromOptions"
class="currency-options">

</div>


</div>









<button
id="swapButton"
type="button">

⇅ 통화 변경

</button>








<label>
변환 후 통화
</label>


<div class="currency-selector">


<div
id="toSelected"
class="selected-currency">


<span id="toFlag">
🇰🇷
</span>


<span id="toText">
KRW - 대한민국 원
</span>


</div>



<input
id="toSearch"
type="text"
placeholder="통화 검색">



<div
id="toOptions"
class="currency-options">

</div>



</div>






<button
id="calculate"
class="calculate-button">

계산하기

</button>




</div>






<div
id="result"
class="calculator-result">

</div>




<div
id="exchangeInfo">

</div>




<button
id="favoriteButton">

⭐ 즐겨찾기 추가

</button>





<section>


<h3>
즐겨찾기
</h3>


<div id="favoriteList">

</div>


</section>







<section>


<h3>
최근 환율
</h3>


<div id="recentRate">

</div>


</section>






<section>


<h3>
최근 7일 환율 변화
</h3>


<canvas id="chart7">

</canvas>


</section>





<section>


<h3>
최근 30일 환율 변화
</h3>


<canvas id="chart30">

</canvas>


</section>






</section>



</div>


</section>


</main>










<footer class="footer">


<div class="container">


<div class="footer-bottom">


<p>
© 2026 EveryCalc. All Rights Reserved.
</p>


<p>
Developed for GitHub Pages
</p>


</div>


</div>


</footer>








<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="../js/currencies.js"></script>


<script src="../js/exchange.js"></script>


<script src="../js/theme.js"></script>


</body>

</html>
