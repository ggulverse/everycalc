<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>환율 계산기 - EveryCalc</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/calculator.css">

</head>


<body>


<header class="site-header">

    <h1>
        EveryCalc
    </h1>

    <p>
        실시간 환율 계산기
    </p>

</header>



<main class="calculator-container">


<section class="calculator-box">


<h2>
환율 계산기
</h2>



<!-- 금액 입력 -->

<div class="input-group">

<label>
금액
</label>

<input 
id="amount"
type="number"
value="1"
min="0">

</div>




<!-- 출발 통화 -->

<div class="currency-selector">


<label>
변환 전 통화
</label>


<div 
class="selected-currency"
id="fromSelected">

<span id="fromIcon"></span>

<span id="fromText">
USD - 미국 달러
</span>

</div>



<input
type="text"
id="fromSearch"
placeholder="통화 검색">


<div
id="fromOptions"
class="currency-options">

</div>


</div>





<!-- 교환 버튼 -->

<button 
id="swapButton"
class="swap-button">

⇄

</button>






<!-- 도착 통화 -->

<div class="currency-selector">


<label>
변환 후 통화
</label>


<div 
class="selected-currency"
id="toSelected">


<span id="toIcon"></span>


<span id="toText">
KRW - 대한민국 원
</span>


</div>




<input
type="text"
id="toSearch"
placeholder="통화 검색">


<div
id="toOptions"
class="currency-options">

</div>



</div>






<button
id="calculate"
class="calculate-button">

계산하기

</button>







<!-- 결과 -->

<div 
id="result"
class="result-box">

</div>



<div
id="exchangeInfo"
class="exchange-info">

</div>






<!-- 즐겨찾기 -->

<section class="favorite-section">


<h3>
즐겨찾기 환율
</h3>


<div id="favoriteList">

</div>


</section>







<!-- 최근 환율 -->

<section class="history-section">


<h3>
최근 환율 정보
</h3>


<div
id="recentRate">

</div>


</section>









<!-- 차트 -->

<section class="chart-section">


<h3>
7일 환율 변화
</h3>


<canvas
id="chart7">

</canvas>



</section>





<section class="chart-section">


<h3>
30일 환율 변화
</h3>


<canvas
id="chart30">

</canvas>



</section>




</section>


</main>







<footer>

<p>
© EveryCalc
</p>

</footer>







<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>




<!-- 통화 데이터 -->

<script src="../js/currencies.js"></script>



<!-- 환율 계산기 -->

<script src="../js/exchange.js"></script>



</body>

</html>
