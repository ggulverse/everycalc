<div class="header-buttons">

<button id="darkModeToggle">
🌙
</button>

</div>


</div>

</header>





<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">

<h1>
환율 계산기
</h1>


<p>
최신 공개 환율 데이터와 국제 금속 가격 기준으로 계산합니다.
</p>

</div>





<div class="calculator-container">


<div class="calculator-box">



<div class="calculator-form">



<label>
금액
</label>


<input
id="amount"
type="number"
value="1"
placeholder="금액 입력">





<label>
변환 전 통화
</label>


<select id="fromCurrency">

</select>






<label>
변환 후 통화
</label>


<select id="toCurrency">

</select>





<button
id="calculate"
class="calculate-button">

계산하기

</button>


</div>






<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>





<div
id="exchangeInfo"
class="calculator-info">

환율 정보를 불러오는 중입니다.

</div>





<div class="calculator-info">


<h2>
환율 계산기 사용 방법
</h2>


<p>
변환할 금액과 통화를 선택하면 공개 환율 데이터를 기준으로 계산합니다.
</p>


<p>
금(XAU)과 은(XAG)은 국제 귀금속 단위 기준으로 계산됩니다.
</p>


<p>
실제 은행 환전 및 거래 가격과 차이가 있을 수 있습니다.
</p>


</div>



</div>


</div>
