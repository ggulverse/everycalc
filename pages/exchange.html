<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>환율 계산기 | EveryCalc</title>


<meta name="description"
content="실시간 환율 변환과 최근 환율 변화를 확인하는 무료 환율 계산기">


<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/calculator.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/darkmode.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<header class="header">

<div class="container">


<div class="logo">

<a href="../index.html">

<span class="logo-main">
EveryCalc
</span>

<span class="logo-sub">
Every Calculation in One Place
</span>

</a>

</div>



<nav class="navigation">

<ul>

<li>
<a href="../index.html">
홈
</a>
</li>


<li>
<a href="../index.html#popular">
계산기 목록
</a>
</li>


</ul>

</nav>



<div class="header-buttons">

<button id="darkModeToggle">

🌙

</button>

</div>


</div>

</header>





<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">


<h1>
환율 계산기
</h1>


<p>
실시간 환율 기준으로 통화를 변환합니다.
</p>


</div>






<div class="calculator-container">


<div class="calculator-box">



<div class="calculator-form">



<label>
금액
</label>


<input
id="amount"
type="number"
value="1"
min="0">






<label>
변환 전 통화
</label>


<div class="currency-selector">


<div
id="fromSelected"
class="selected-currency">

<span id="fromIcon">
🇺🇸
</span>

<span id="fromText">
USD - 미국 달러
</span>

</div>


<input
id="fromSearch"
type="text"
placeholder="통화 검색">


<div
id="fromOptions"
class="currency-options">

</div>


</div>






<button
id="swapButton"
type="button">

⇄

</button>







<label>
변환 후 통화
</label>


<div class="currency-selector">


<div
id="toSelected"
class="selected-currency">


<span id="toIcon">
🇰🇷
</span>


<span id="toText">
KRW - 대한민국 원
</span>


</div>


<input
id="toSearch"
type="text"
placeholder="통화 검색">



<div
id="toOptions"
class="currency-options">

</div>


</div>







<button
id="calculate"
class="calculate-button">

계산하기

</button>



</div>







<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>






<div
id="exchangeInfo"
class="calculator-info">

</div>






<div class="calculator-info">


<h2>
즐겨찾기 환율
</h2>


<div id="favoriteList">

</div>


</div>






<div class="calculator-info">


<h2>
최근 환율 정보
</h2>


<div id="recentRate">

</div>


</div>








<div class="calculator-info">


<h2>
7일 환율 변화
</h2>


<canvas id="chart7">

</canvas>


</div>






<div class="calculator-info">


<h2>
30일 환율 변화
</h2>


<canvas id="chart30">

</canvas>


</div>







</div>





<div class="calculator-info">


<h2>
환율 계산기 사용 방법
</h2>


<p>

금액과 변환할 통화를 선택하면 현재 환율 기준으로 계산합니다.

</p>


<p>

자주 사용하는 통화 조합은 즐겨찾기에 저장할 수 있습니다.

</p>


</div>




</div>


</div>


</section>


</main>







<footer class="footer">


<div class="container">


<div class="footer-bottom">


<p>
© 2026 EveryCalc. All Rights Reserved.
</p>


</div>


</div>


</footer>






<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="../js/theme.js"></script>


<script src="../js/currencies.js"></script>


<script src="../js/exchange.js"></script>



</body>

</html>
