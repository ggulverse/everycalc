<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
환율 계산기 | EveryCalc
</title>


<meta name="description"
content="국가별 환율 계산과 최근 환율 차트를 제공하는 무료 환율 계산기">


<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/calculator.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/darkmode.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<header class="header">


<div class="container">


<div class="logo">


<a href="../index.html">


<span class="logo-main">
EveryCalc
</span>


<span class="logo-sub">
Every Calculation in One Place
</span>


</a>


</div>





<nav class="navigation">


<ul>


<li>
<a href="../index.html">
홈
</a>
</li>


<li>
<a href="../index.html#popular">
계산기 목록
</a>
</li>


</ul>


</nav>





<div class="header-buttons">


<button id="darkModeToggle"
aria-label="다크모드">

🌙

</button>


</div>


</div>


</header>





<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">


<h1>
환율 계산기
</h1>


<p>
원하는 국가의 환율을 계산하고 최근 변동 차트를 확인합니다.
</p>


</div>





<div class="calculator-container">


<div class="calculator-box">





<div class="calculator-form">



<label>
금액
</label>


<input
id="amount"
type="number"
placeholder="예: 100">





<label>
출발 국가
</label>


<div class="currency-selector">



<div id="fromSelected"
class="currency-selected">


<span id="fromIcon">
🇺🇸
</span>


<span id="fromText">
USD - 미국 달러
</span>


</div>





<input
id="fromSearch"
type="text"
placeholder="국가 검색">





<div id="fromOptions"
class="currency-options">

</div>



</div>





<label>
도착 국가
</label>


<div class="currency-selector">



<div id="toSelected"
class="currency-selected">


<span id="toIcon">
🇰🇷
</span>


<span id="toText">
KRW - 대한민국 원
</span>


</div>





<input
id="toSearch"
type="text"
placeholder="국가 검색">





<div id="toOptions"
class="currency-options">

</div>



</div>





<button
id="swapButton"
type="button">

⇄

</button>





<button
id="calculate"
class="calculate-button">


계산하기


</button>



</div>
<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>




<div
id="exchangeInfo">

</div>




<div
id="recentRate">

</div>





<div class="favorite-area">


<h3>
즐겨찾기
</h3>


<div id="favoriteList">

</div>


</div>





</div>





<div class="calculator-info">


<h2>
환율 차트
</h2>



<div class="chart-container">


<canvas id="chart7"></canvas>


</div>




<br>




<div class="chart-container">


<canvas id="chart30"></canvas>


</div>



</div>







<div class="calculator-info">


<h2>
환율 계산기 사용 방법
</h2>


<p>
출발 국가와 도착 국가를 선택하고 금액을 입력하면 환율을 계산합니다.
</p>


<p>
최근 환율 정보와 7일, 30일 변동 차트를 확인할 수 있습니다.
</p>


</div>





</div>


</div>


</section>


</main>






<footer class="footer">


<div class="container">


<div class="footer-bottom">


<p>
© 2026 EveryCalc. All Rights Reserved.
</p>


</div>


</div>


</footer>






<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="../js/theme.js"></script>


<script src="../js/currencies.js"></script>


<script src="../js/exchange.js"></script>



</body>


</html>
