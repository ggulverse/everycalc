<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
환율 계산기 - 국가별 환율 계산 | EveryCalc
</title>


<meta name="description"
content="국가별 환율 계산과 최근 환율 차트를 제공합니다">

<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"WebApplication",
 "name":"EveryCalc 환율 계산기",
 "applicationCategory":"FinanceApplication",
 "description":"환율 계산기는 국가별 환율 계산, 실시간 환율 조회, 기간별 환율 변동 차트를 제공합니다."
}
</script>

<link rel="canonical"
href="https://ggulverse.github.io/everycalc/pages/exchange.html">
     
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/calculator.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/darkmode.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<header class="header">


<div class="container">


<div class="logo">


<a href="../index.html">


<span class="logo-main">
EveryCalc
</span>


<span class="logo-sub">
Every Calculation in One Place
</span>


</a>


</div>





<nav class="navigation">


<ul>


<li>
<a href="../index.html">
홈
</a>
</li>


<li>
<a href="../index.html#popular">
계산기 목록
</a>
</li>


</ul>


</nav>





<div class="header-buttons">


<button id="darkModeToggle"
aria-label="다크모드">

🌙

</button>


</div>


</div>


</header>





<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">


<h1>
환율 계산기
</h1>


<p>
원하는 국가의 환율을 계산하고 최근 변동 차트를 확인합니다.
</p>


</div>





<div class="calculator-container">


<div class="calculator-box">





<div class="calculator-form">



<label>
금액
</label>


<input
id="amount"
type="number"
placeholder="예: 100">



<!-- ==========================
     환율 선택 영역
========================== -->


<div class="exchange-currency-area">



<div class="currency-side">


<label>
출발 국가
</label>



<div class="currency-selector">



<div id="fromSelected"
class="currency-selected">


<span id="fromIcon">
🇺🇸
</span>


<span id="fromText">
USD - 미국 달러
</span>


</div>





<input
id="fromSearch"
type="text"
placeholder="국가 검색">





<div id="fromOptions"
class="currency-options">

</div>



</div>


</div>






<button
id="swapButton"
type="button"
class="swap-button">

⇄

</button>






<div class="currency-side">


<label>
도착 국가
</label>



<div class="currency-selector">



<div id="toSelected"
class="currency-selected">


<span id="toIcon">
🇰🇷
</span>


<span id="toText">
KRW - 대한민국 원
</span>


</div>





<input
id="toSearch"
type="text"
placeholder="국가 검색">





<div id="toOptions"
class="currency-options">

</div>



</div>


</div>



</div>





<button
id="calculate"
class="calculate-button">


계산하기


</button>



</div>





<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>



<div
id="exchangeInfo">

</div>


</div>



<div class="calculator-info">


<h2>
환율 차트
</h2>


<p id="exchangeChartUnit" class="chart-unit">
1 USD당 KRW
</p>


<div class="chart-period-buttons">

<button 
class="period-button active"
data-period="7">

7일

</button>


<button 
class="period-button"
data-period="30">

1개월

</button>


<button 
class="period-button"
data-period="365">

1년

</button>


</div>



<div class="chart-container">


<canvas id="exchangeChart"></canvas>


</div>



</div>




<div class="calculator-info">


<h2>
환율 계산기 사용 방법
</h2>


<p>
출발 국가와 도착 국가를 선택하고 금액을 입력하면 환율을 계산합니다.
</p>


<p>
7일, 1개월, 1년 동안의 환율 변동 차트를 확인할 수 있습니다.
</p>


</div>





</div>


</div>


</section>


</main>

<div class="container">


<div class="footer-bottom">

</div>

</body>


</html>
