<meta name="keywords"
content="환율 계산기, 환율 변환, 달러 환율, 엔화 환율, 원달러 환율">


<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">

<body>

<div class="container">


<div class="logo">

<a href="../index.html">

<span class="logo-main">
EveryCalc
</span>

</span>

</ul>

<div class="header-buttons">

<button id="darkModeToggle">
🌙
</button>

</div>


</div>

</header>





<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">


<h1>
환율 계산기
</h1>


<p>
최신 공개 환율 데이터를 기준으로 통화를 변환합니다.
</p>


</div>





<div class="calculator-container">


<div class="calculator-box">



<div class="calculator-form">


<label>
금액
</label>


<input
id="amount"
type="number"
placeholder="변환할 금액 입력"
value="1">





<label>
변환 전 통화
</label>


<select id="fromCurrency">

</select>



<label>
변환 후 통화
</label>


<select id="toCurrency">

</select>




<button
id="calculate"
class="calculate-button">

계산하기

</button>



</div>






<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>




<div
id="exchangeInfo"
class="calculator-info">

환율 정보를 불러오는 중입니다.

</div>




</div>


</div>






<div class="calculator-info">


<h2>
환율 계산기 사용 방법
</h2>


<p>
변환할 금액과 기준 통화를 선택하면 최신 공개 환율 데이터를 기준으로 환산 결과를 제공합니다.
</p>


<p>
환율 데이터는 공개 환율 정보를 기반으로 하며 실제 은행 환전 시 적용되는 환율과 차이가 있을 수 있습니다.
</p>


</div>







</div>
