<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
귀금속 시세 계산기 | EveryCalc
</title>


<meta name="description"
content="금, 은, 백금, 팔라듐 등 주요 귀금속 시세를 계산하고 변동 차트를 확인하는 무료 귀금속 계산기">


<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/calculator.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/darkmode.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<header class="header">


<div class="container">


<div class="logo">


<a href="../index.html">


<span class="logo-main">
EveryCalc
</span>


<span class="logo-sub">
Every Calculation in One Place
</span>


</a>


</div>





<nav class="navigation">


<ul>


<li>
<a href="../index.html">
홈
</a>
</li>


<li>
<a href="../index.html#popular">
계산기 목록
</a>
</li>


</ul>


</nav>





<div class="header-buttons">


<button
id="darkModeToggle"
aria-label="다크모드">

🌙

</button>


</div>


</div>


</header>





<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">


<h1>
귀금속 시세 계산기
</h1>


<p>
금, 은, 백금, 팔라듐의 현재 시세를 계산하고 변동 차트를 확인합니다.
</p>


</div>





<div class="calculator-container">


<div class="calculator-box">



<div class="calculator-form">



<label>
귀금속 선택
</label>


<select id="metalSelect">


<option value="XAU">
🟡 금 (XAU)
</option>


<option value="XAG">
⚪ 은 (XAG)
</option>


<option value="XPT">
⚪ 백금 (XPT)
</option>


<option value="XPD">
⚪ 팔라듐 (XPD)
</option>


</select>





<label>
수량
</label>


<input
id="amount"
type="number"
value="1"
placeholder="예: 1">





<label>
단위
</label>


<select id="unitSelect">


<option value="g">
그램 (g)
</option>


<option value="don">
돈 (3.75g)
</option>


<option value="oz">
트로이온스 (oz)
</option>


</select>





<label>
표시 통화
</label>


<select id="currencySelect">


<option value="KRW">
🇰🇷 대한민국 원 (KRW)
</option>


<option value="USD">
🇺🇸 미국 달러 (USD)
</option>


<option value="EUR">
🇪🇺 유로 (EUR)
</option>


<option value="JPY">
🇯🇵 일본 엔 (JPY)
</option>


</select>





<button
id="calculate"
class="calculate-button">

계산하기

</button>



</div>





<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>





<div
id="metalInfo">

</div>



</div>





<div class="calculator-info">


<h2>
귀금속 시세 차트
</h2>


<p id="metalChartUnit" class="chart-unit">
1 트로이온스(oz)당 KRW
</p>

<div class="chart-period">

<button class="period-button active" data-period="7">
7일
</button>

<button class="period-button" data-period="30">
1개월
</button>

<button class="period-button" data-period="365">
1년
</button>

</div>


<div class="chart-container">


<canvas id="metalChart"></canvas>


</div>







</div>









<div class="calculator-info">


<h2>
귀금속 계산기 사용 방법
</h2>


<p>
금, 은, 백금, 팔라듐 중 원하는 귀금속을 선택합니다.
</p>


<p>
그램(g), 돈, 트로이온스 단위와 원하는 통화 기준으로 시세를 계산합니다.
</p>


</div>





</div>


</div>


</section>


</main>







<footer class="footer">


<div class="container">


<div class="footer-bottom">


<p>

</p>


</div>


</div>


</footer>

<script src="../js/metals.js"></script>


<script src="../js/metal.js"></script>




</body>


</html>
