<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
귀금속 시세 계산기 | EveryCalc
</title>


<meta name="description"
content="금, 은, 백금, 팔라듐 등 주요 귀금속 시세를 계산하고 변동 차트를 확인하는 무료 귀금속 계산기">


<link rel="stylesheet"
href="../css/style.css">

<link rel="stylesheet"
href="../css/header.css">

<link rel="stylesheet"
href="../css/cards.css">

<link rel="stylesheet"
href="../css/calculator.css">

<link rel="stylesheet"
href="../css/footer.css">

<link rel="stylesheet"
href="../css/responsive.css">



</head>


<body>



<header class="site-header">


<div class="container header-inner">



<a href="../index.html"
class="logo">


<strong>
EveryCalc
</strong>


<span>
모든 계산을 하나로
</span>


</a>




<button
class="theme-button"
id="themeButton">


🌙


</button>


</div>


</header>





<main>


<section class="calculator-page">


<div class="container">


<div class="section-title">



<div class="page-icon metal-icon">

</div>



<h1>

귀금속 시세 계산기

</h1>


<p>

금, 은, 백금, 팔라듐의 시세를 계산하고
변동 차트를 확인합니다.

</p>


</div>

<div class="calculator-box">



<div class="input-group">


<label>

귀금속 선택

</label>



<select id="metalSelect">


<option value="XAU">

금 (XAU)

</option>


<option value="XAG">

은 (XAG)

</option>


<option value="XPT">

백금 (XPT)

</option>


<option value="XPD">

팔라듐 (XPD)

</option>


</select>


</div>






<div class="input-group">


<label>

수량

</label>



<input

id="amount"

type="number"

value="1"

placeholder="예: 1">


</div>






<div class="input-group">


<label>

단위

</label>



<select id="unitSelect">


<option value="g">

그램 (g)

</option>


<option value="don">

돈 (3.75g)

</option>


<option value="oz">

트로이온스 (oz)

</option>


</select>


</div>







<div class="input-group">


<label>

표시 통화

</label>



<select id="currencySelect">


<option value="KRW">

대한민국 원 (KRW)

</option>


<option value="USD">

미국 달러 (USD)

</option>


<option value="EUR">

유로 (EUR)

</option>


<option value="JPY">

일본 엔 (JPY)

</option>


</select>


</div>






<button

id="calculate"

class="calculate-button">


계산하기


</button>



</div>

<div class="result-card">


<h2>

계산 결과

</h2>



<div

id="result"

class="result-value">


결과가 표시됩니다.


</div>



</div>





<div class="description-card"

id="metalInfo">


</div>
