<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>날짜 계산기 | EveryCalc</title>


<meta name="description"
content="두 날짜 사이의 기간과 D-Day를 계산하는 무료 날짜 계산기">


<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/calculator.css">
<link rel="stylesheet" href="../css/date.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/darkmode.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<header class="header">

<div class="container">


<div class="logo">

<a href="../index.html">

<span class="logo-main">
EveryCalc
</span>

<span class="logo-sub">
Every Calculation in One Place
</span>

</a>

</div>


<nav class="navigation">

<ul>

<li>
<a href="../index.html">
홈
</a>
</li>


<li>
<a href="../index.html#popular">
계산기 목록
</a>
</li>

</ul>

</nav>


<div class="header-buttons">

<button id="darkModeToggle">
🌙
</button>

</div>


</div>

</header>





<main>


<section class="calculator-page">


<div class="container">


<div class="calculator-header">

<h1>
날짜 계산기
</h1>


<p>
두 날짜 사이의 기간과 D-Day를 계산합니다.
</p>

</div>





<div class="calculator-container">


<div class="calculator-box">


<div class="calculator-form">



<label>
시작 날짜
</label>


<div class="date-input-group">


<input
id="startDate"
type="text"
placeholder="예: 2026-01-01">


<button
type="button"
id="startCalendarButton">

📅

</button>


</div>




<label>
종료 날짜
</label>


<div class="date-input-group">


<input
id="endDate"
type="text"
placeholder="예: 2026-12-31">


<button
type="button"
id="endCalendarButton">

📅

</button>


</div>





<div
id="calendarArea"
class="calendar-area">

</div>





<button
id="calculate"
class="calculate-button">

계산하기

</button>



</div>






<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>




<div
id="resultCalendar"
class="result-calendar-area">

</div>




</div>





<div class="calculator-info">


<h2>
날짜 계산기 사용 방법
</h2>


<p>
날짜를 직접 입력하거나 달력에서 선택하여 두 날짜 사이의 기간을 계산합니다.
</p>


<p>
윤년과 월별 날짜 수를 자동 적용하여 정확하게 계산합니다.
</p>


</div>



</div>


</div>


</section>


</main>





<footer class="footer">


<div class="container">


<div class="footer-bottom">

<p>

</p>

<p class="brand-parent">

GGULVERSE
</a>

</p>

</div>


</div>


</footer>





<script src="../js/theme.js"></script>

<script src="../js/date.js"></script>


</body>

</html>
