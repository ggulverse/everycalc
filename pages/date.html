<section class="calculator-page">

<h1>

</h1>


<p>
두 날짜 사이의 기간과 날짜 차이를 계산합니다.
</p>

<div class="calculator-container">


<div class="calculator-box">

<label>
시작 날짜
</label>


<input
id="startDate"
type="date">



<label>
종료 날짜
</label>


<input
id="endDate"
type="date">



<button
id="calculate"
class="calculate-button">

계산하기

</button>


</div>




<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>



</div>




<div class="calculator-info">


<h2>
날짜 계산기 사용 방법
</h2>

시작 날짜와 종료 날짜를 입력하면 두 날짜 사이의 일수를 계산합니다.

</p>


<p>

D-Day, 기념일, 프로젝트 기간, 근무 기간 등을 확인할 때 활용할 수 있습니다.
