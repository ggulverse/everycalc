<meta name="description"
content="생년월일을 입력하여 만 나이와 다음 생일까지 계산하는 무료 나이 계산기">


<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/calculator.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/darkmode.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<header class="header">

<div class="container">


<div class="logo">

<a href="../index.html">

<span class="logo-main">
EveryCalc
</span>

<span class="logo-sub">
Every Calculation in One Place
</span>

</a>

</div>



<nav class="navigation">

<ul>

<li>
<a href="../index.html">

</a>
</li>


<li>
<a href="../index.html#popular">
인기 계산기
</a>
</li>


</ul>

</nav>



<div class="header-buttons">

<button id="darkModeToggle">
🌙
</button>

</div>


</div>

</header>







<main>


<section class="calculator-page">


<div class="container">



<div class="calculator-header">

<h1>
나이 계산기
</h1>


<p>
생년월일 기준 만 나이와 다음 생일까지 계산합니다.
</p>


</div>







<div class="calculator-container">


<div class="calculator-box">





<div class="calculator-form">





<label>
생년월일
</label>


<div class="date-input-group">


<input
id="birthDate"
type="text"
placeholder="YYYY-MM-DD">


<button
type="button"
id="birthCalendarButton">

📅

</button>


</div>






<label>
기준 날짜
</label>


<div class="date-input-group">


<input
id="targetDate"
type="text"
placeholder="YYYY-MM-DD">


<button
type="button"
id="targetCalendarButton">

📅

</button>


</div>






<div id="calendarArea"></div>





<button
id="calculate"
class="calculate-button">

계산하기

</button>




</div>








<div
id="result"
class="calculator-result">

결과가 표시됩니다.

</div>






</div>







<div class="calculator-info">


<h2>
나이 계산기 사용 방법
</h2>


<p>
생년월일을 입력하면 만 나이와 세는 나이를 계산합니다.
</p>


<p>
기준 날짜는 오늘 날짜가 자동 적용됩니다.
</p>


</div>






</div>


</section>


</main>

<div class="container">

</html>
